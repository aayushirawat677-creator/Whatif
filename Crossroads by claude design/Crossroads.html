<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossroads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #2a1503; overflow: hidden; }
  * { box-sizing: border-box; }
  #root { height: 100%; }

  .stage-viewport { position: fixed; inset: 0; overflow: hidden; background: #f0a44a; }
  .stage { position: absolute; width: 1672px; height: 941px; left: 50%; top: 50%; transform-origin: center center; }
  .stage-bg { position: absolute; inset: 0; background: url("assets/crossroads-bg.png") center / cover no-repeat; }
  .warmth-overlay { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 40%, rgba(255,140,40,0.35), rgba(120,40,0,0.55)); mix-blend-mode: multiply; pointer-events: none; }

  .wordmark { position: absolute; top: 34px; left: 44px; font-family: 'Bree Serif', serif; font-size: 30px; letter-spacing: 0.32em; color: #5b3217; opacity: 0.85; user-select: none; }
  .wordmark .dot { color: #a8541f; }

  /* ---------- Character ---------- */
  .char-wrap { position: absolute; transform: translate(-50%, -100%); transform-origin: 50% 100%; cursor: pointer; }
  .char-wrap.no-click { cursor: default; pointer-events: none; }
  .char-pace { animation: pace 9s ease-in-out infinite; }
  .char-video-shell { position: relative; height: 100%; overflow: hidden; }
  .char-video { display: block; height: 108%; width: auto; margin-top: -2%; transform: scale(1.06); transform-origin: center bottom; filter: drop-shadow(0 6px 10px rgba(80,30,0,0.35)); }
  .call-frame { overflow: hidden; }
  .call-frame .char-zoom { position: absolute; width: 520px; left: 20px; bottom: -4px; height: auto; max-height: 108%; object-fit: cover; object-position: center top; transform: scale(1.04); transform-origin: center bottom; }
  @keyframes pace {
    0%   { transform: translateX(-70px); }
    42%  { transform: translateX(70px); }
    50%  { transform: translateX(70px) rotate(-2deg); }
    92%  { transform: translateX(-70px); }
    100% { transform: translateX(-70px) rotate(2deg); }
  }
  .qmark { position: absolute; top: -64px; left: 58%; font-family: 'Bree Serif', serif; font-size: 52px; color: #fff7e0; text-shadow: 0 2px 0 #8a4a18, 0 6px 14px rgba(90,40,0,0.4); animation: qfloat 2.4s ease-in-out infinite; user-select: none; }
  .qmark.q2 { left: 18%; top: -46px; font-size: 34px; animation-delay: 1.2s; opacity: 0.85; }
  @keyframes qfloat { 0%, 100% { transform: translateY(0) rotate(-6deg); opacity: 0.55; } 50% { transform: translateY(-14px) rotate(7deg); opacity: 1; } }

  .hint { position: absolute; z-index: 8; bottom: 46px; left: 50%; transform: translateX(-50%); font-family: 'IM Fell English', serif; font-style: italic; font-size: 27px; color: #fff3d8; text-shadow: 0 2px 8px rgba(100,45,0,0.55); animation: hint-pulse 2.6s ease-in-out infinite; white-space: nowrap; user-select: none; pointer-events: none; }
  @keyframes hint-pulse { 0%, 100% { opacity: 0.65; } 50% { opacity: 1; } }

  /* ---------- Ask panel (video call) ---------- */
  .panel-backdrop { position: absolute; inset: 0; background: rgba(58, 26, 2, 0.45); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; animation: fade-in 0.35s ease both; z-index: 20; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  .call-card { width: 560px; background: #fdf3da; border: 3px solid #7a4a23; border-radius: 18px; box-shadow: 0 24px 70px rgba(60, 25, 0, 0.55), inset 0 0 0 6px #f3e0b4; overflow: hidden; animation: rise-in 0.45s cubic-bezier(0.2, 1.4, 0.4, 1) both; }
  @keyframes rise-in { from { opacity: 0; transform: translateY(36px) scale(0.94); } to { opacity: 1; transform: none; } }

  .call-header { display: flex; align-items: center; gap: 10px; padding: 13px 18px; background: #5b3217; color: #fdf3da; font-family: 'Bree Serif', serif; font-size: 17px; letter-spacing: 0.06em; }
  .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff5d45; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
  .call-header .spacer { flex: 1; }
  .call-close { background: none; border: none; color: #f3e0b4; font-size: 22px; cursor: pointer; line-height: 1; padding: 2px 6px; font-family: inherit; }
  .call-close:hover { color: #ffffff; }

  .call-frame { position: relative; height: 330px; overflow: hidden; background: linear-gradient(180deg, #f7a13d 0%, #fbc468 55%, #e8943c 100%); }
  .call-caption { position: absolute; left: 14px; bottom: 12px; background: rgba(60, 28, 4, 0.72); color: #ffeec9; font-family: 'IM Fell English', serif; font-style: italic; font-size: 16px; padding: 5px 12px; border-radius: 8px; }

  .call-body { padding: 20px 24px 24px; }
  .call-prompt { font-family: 'Bree Serif', serif; color: #5b3217; font-size: 21px; margin: 0 0 12px; }
  .call-input { width: 100%; min-height: 76px; resize: none; border: 2px solid #c89a5e; border-radius: 12px; background: #fffaf0; padding: 12px 14px; font-family: 'IM Fell English', serif; font-size: 19px; color: #4a2a10; outline: none; }
  .call-input:focus { border-color: #a8541f; box-shadow: 0 0 0 3px rgba(200, 120, 40, 0.25); }
  .call-actions { display: flex; gap: 12px; margin-top: 16px; align-items: center; }
  .btn { font-family: 'Bree Serif', serif; font-size: 18px; border-radius: 12px; padding: 12px 22px; cursor: pointer; border: 2px solid #7a4a23; transition: transform 0.12s ease, box-shadow 0.12s ease; }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: #a8541f; color: #fff3d8; box-shadow: 0 4px 0 #6e3410; }
  .btn-primary:hover { background: #b9622a; }
  .btn-primary:disabled { opacity: 0.5; cursor: default; box-shadow: none; }
  .btn-ghost { background: transparent; color: #7a4a23; border-color: #c89a5e; }
  .btn-ghost:hover { background: rgba(170, 110, 50, 0.12); }

  /* ---------- Consulting ---------- */
  .consult-toast { position: absolute; z-index: 15; left: 50%; top: 38%; transform: translate(-50%, -50%); background: rgba(60, 28, 4, 0.78); color: #ffeec9; font-family: 'IM Fell English', serif; font-style: italic; font-size: 30px; padding: 18px 38px; border-radius: 16px; box-shadow: 0 14px 50px rgba(60, 25, 0, 0.5); animation: fade-in 0.4s ease both; }
  .consult-toast .dots span { animation: dotpulse 1.4s infinite; display: inline-block; }
  .consult-toast .dots span:nth-child(2) { animation-delay: 0.2s; }
  .consult-toast .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotpulse { 0%, 60%, 100% { opacity: 0.2; } 30% { opacity: 1; } }

  /* ---------- Signboards ---------- */
  .sign { position: absolute; transform: translate(-50%, -100%); cursor: pointer; transition: filter 0.2s ease; animation: sign-pop 0.55s cubic-bezier(0.2, 1.5, 0.4, 1) both; }
  @keyframes sign-pop { from { opacity: 0; transform: translate(-50%, -100%) translateY(60px) scale(0.5); } to { opacity: 1; transform: translate(-50%, -100%); } }
  .sign-inner { position: relative; height: 100%; transition: transform 0.18s ease; }
  .sign:hover .sign-inner { transform: scale(1.05) rotate(-1.5deg); }
  .sign:hover { filter: drop-shadow(0 0 18px rgba(255, 230, 150, 0.85)); }
  .sign-img { display: block; height: 100%; }
  .sign-label { position: absolute; left: 9%; top: 25.5%; width: 80%; height: 20%; display: flex; align-items: center; justify-content: center; text-align: center; font-family: 'Bree Serif', serif; color: #4f2c10; transform: rotate(-2.5deg); line-height: 1.02; padding: 0 7%; pointer-events: none; }

  /* ---------- Reading card ---------- */
  .card-backdrop { position: absolute; inset: 0; background: rgba(42, 19, 2, 0.55); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; animation: fade-in 0.3s ease both; z-index: 20; }
  .reading-card { width: 470px; perspective: 1200px; }
  .reading-card-inner { background: #f7e8c3; border: 3px solid #7a4a23; border-radius: 16px; box-shadow: 0 28px 80px rgba(50, 20, 0, 0.6), inset 0 0 0 7px #efdba8, inset 0 0 60px rgba(190, 130, 50, 0.25); padding: 30px 34px 24px; animation: card-flip 0.55s cubic-bezier(0.3, 1.2, 0.4, 1) both; }
  @keyframes card-flip { from { transform: rotateY(85deg); opacity: 0; } to { transform: none; opacity: 1; } }
  .card-numeral { text-align: center; font-family: 'Bree Serif', serif; font-size: 19px; letter-spacing: 0.5em; color: #a8541f; margin-bottom: 6px; }
  .card-title { text-align: center; font-family: 'Bree Serif', serif; font-size: 33px; color: #4f2c10; margin: 0 0 4px; line-height: 1.1; }
  .card-essence { text-align: center; font-family: 'IM Fell English', serif; font-style: italic; font-size: 19px; color: #8a5a2a; margin: 0 0 14px; }
  .card-rule { display: flex; align-items: center; gap: 10px; color: #b97f3e; margin: 6px 0 14px; }
  .card-rule::before, .card-rule::after { content: ""; flex: 1; height: 2px; background: linear-gradient(90deg, transparent, #c89a5e); }
  .card-rule::after { background: linear-gradient(90deg, #c89a5e, transparent); }
  .card-reading { font-family: 'IM Fell English', serif; font-size: 19.5px; line-height: 1.5; color: #4a2a10; margin: 0 0 18px; text-wrap: pretty; }
  .card-watchword { text-align: center; margin-bottom: 20px; }
  .card-watchword span { display: inline-block; font-family: 'Bree Serif', serif; font-size: 15px; letter-spacing: 0.28em; text-transform: uppercase; color: #fdf3da; background: #7a4a23; border-radius: 999px; padding: 7px 20px 6px; }
  .card-footer { display: flex; align-items: center; gap: 10px; }
  .card-nav { display: flex; gap: 6px; }
  .nav-arrow { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #c89a5e; background: transparent; color: #7a4a23; font-size: 20px; cursor: pointer; font-family: 'Bree Serif', serif; }
  .nav-arrow:hover { background: rgba(170, 110, 50, 0.14); }
  .nav-arrow:disabled { opacity: 0.3; cursor: default; }
  .card-footer .flex { flex: 1; }

  /* ---------- Epilogue ---------- */
  .epilogue { position: absolute; inset: 0; z-index: 30; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 50% 35%, rgba(80, 35, 5, 0.55), rgba(30, 12, 0, 0.88)); animation: fade-in 1s ease both; }
  .epi-card { width: 640px; text-align: center; color: #ffeec9; }
  .epi-eyebrow { font-family: 'Bree Serif', serif; letter-spacing: 0.4em; font-size: 16px; color: #e8b06a; text-transform: uppercase; margin-bottom: 14px; }
  .epi-title { font-family: 'Bree Serif', serif; font-size: 46px; margin: 0 0 10px; line-height: 1.15; }
  .epi-sub { font-family: 'IM Fell English', serif; font-style: italic; font-size: 23px; color: #f3cf96; margin: 0 0 34px; }
  .epi-actions { margin-bottom: 44px; }
  .btn-big { font-size: 21px; padding: 15px 34px; }
  .nps-q { font-family: 'IM Fell English', serif; font-size: 20px; font-style: italic; color: #e8c693; margin-bottom: 14px; }
  .nps-row { display: flex; gap: 8px; justify-content: center; }
  .nps-chip { width: 44px; height: 44px; border-radius: 10px; border: 2px solid #8a5a2a; background: rgba(255, 235, 195, 0.08); color: #ffeec9; font-family: 'Bree Serif', serif; font-size: 17px; cursor: pointer; transition: all 0.12s ease; }
  .nps-chip:hover { background: #a8541f; border-color: #e8b06a; transform: translateY(-3px); }
  .nps-thanks { font-family: 'IM Fell English', serif; font-style: italic; font-size: 23px; color: #ffeec9; animation: fade-in 0.5s ease both; }
  .nps-scale-hints { display: flex; justify-content: space-between; width: 564px; margin: 8px auto 0; font-family: 'IM Fell English', serif; font-style: italic; font-size: 14px; color: #b98d55; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="crossroads-app.jsx"></script>
</body>
</html>
